version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: nest_test
      POSTGRES_USER: nest
      POSTGRES_PASSWORD: nest_test_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nest"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
